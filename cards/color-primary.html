<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--ivory); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; font-family: var(--font-sans); }
  .sw b { font-size: 12px; font-weight: 700; }
  .sw span { font-size: 11px; opacity: 0.8; font-variant-numeric: tabular-nums; }
  .light b, .light span { color: var(--ink-900); }
  .dark b, .dark span { color: var(--ivory); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--clay-50)"><b>clay-50</b><span>#F8EADF</span></div>
    <div class="sw light" style="background:var(--clay-100)"><b>clay-100</b><span>#F0D3C0</span></div>
    <div class="sw light" style="background:var(--clay-300)"><b>clay-300</b><span>#DB9B73</span></div>
    <div class="sw dark" style="background:var(--clay-500)"><b>clay-500 ·主</b><span>#C2683E</span></div>
    <div class="sw dark" style="background:var(--clay-600)"><b>clay-600</b><span>#A8552F</span></div>
    <div class="sw dark" style="background:var(--clay-700)"><b>clay-700</b><span>#8C4525</span></div>
  </div>
</body>
</html>
