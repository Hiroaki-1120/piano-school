<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>おとなりピアノ — ロゴ案</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--cream); }
  .mark-cap { font-family: var(--font-sans); font-size: 12px; color: var(--ink-500); line-height: 1.7; }
  .word { font-family: var(--font-display); font-weight: 700; color: var(--ink-900); letter-spacing: .02em; white-space: nowrap; }
  .ab-inner { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; padding: 26px 20px; box-sizing: border-box; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .divider { width: 100%; height: 1px; background: var(--hairline); }
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const C = { clay: "#C2683E", clayDeep: "#8C4525", honey: "#DE9F3A", honeySoft: "#E8B257", ink: "#2B2117", ivory: "#FFFDF8", cream: "#FAF4EA", sand: "#F3E8D6", wood: "#8A5A38", sage: "#6E8B5E", linen: "#ECDFC9" };

// ---- reusable bits ----
function Keys({ w = 1, fill = C.ivory, black = C.ink }) {
  return (
    <g>
      <rect x="11" y="20" width="6" height="24" rx="2" fill={fill}/>
      <rect x="20" y="20" width="6" height="24" rx="2" fill={fill}/>
      <rect x="29" y="20" width="6" height="24" rx="2" fill={fill}/>
      <rect x="15.5" y="20" width="4" height="14" rx="1.5" fill={black}/>
      <rect x="24.5" y="20" width="4" height="14" rx="1.5" fill={black}/>
    </g>
  );
}
function Note({ x = 0, y = 0, s = 1, fill = C.honey, stem = C.ink }) {
  return (
    <g transform={`translate(${x},${y}) scale(${s})`}>
      <rect x="13" y="-2" width="3" height="20" rx="1.5" fill={stem}/>
      <path d="M16 2 q8 -3 8 4" stroke={stem} strokeWidth="3" fill="none" strokeLinecap="round"/>
      <circle cx="7" cy="18" r="6" fill={fill}/>
    </g>
  );
}
const Word = ({ size = 26, color }) => (
  <span className="word" style={{ fontSize: size, color: color || C.ink }}>おとなりピアノ</span>
);

// ===== A · キーズタイル（現行を洗練） =====
function MarkA({ d = 96 }) {
  return (
    <svg width={d} height={d} viewBox="0 0 48 48">
      <rect x="0" y="0" width="48" height="48" rx="14" fill={C.clay}/>
      <Keys/>
      <circle cx="35" cy="33" r="5.5" fill={C.honey} stroke={C.clay} strokeWidth="1.5"/>
    </svg>
  );
}
// ===== B · おとなりハウス（音 × 家・ご近所） =====
function MarkB({ d = 96 }) {
  return (
    <svg width={d} height={d} viewBox="0 0 56 56">
      <path d="M28 4 L52 22 V50 a3 3 0 0 1 -3 3 H7 a3 3 0 0 1 -3 -3 V22 Z" fill={C.clay}/>
      <path d="M28 4 L52 22 H4 Z" fill={C.clayDeep}/>
      <g transform="translate(20,26)">
        <rect x="11" y="-3" width="3.4" height="20" rx="1.7" fill={C.ivory}/>
        <path d="M14.4 1 q9 -3 9 5" stroke={C.ivory} strokeWidth="3.4" fill="none" strokeLinecap="round"/>
        <circle cx="5" cy="17" r="6.5" fill={C.honey}/>
      </g>
    </svg>
  );
}
// ===== C · ノートドット（タイポ主役） =====
function MarkC({ d = 96 }) {
  return (
    <svg width={d} height={d} viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="26" fill="none" stroke={C.linen} strokeWidth="2"/>
      <g transform="translate(16,12)">
        <rect x="16" y="0" width="4.5" height="30" rx="2.25" fill={C.ink}/>
        <path d="M20.5 4 q12 -4 12 7" stroke={C.ink} strokeWidth="4.5" fill="none" strokeLinecap="round"/>
        <circle cx="7" cy="30" r="9" fill={C.honey}/>
      </g>
    </svg>
  );
}
// ===== D · 鍵盤アンダーライン =====
function KeysBar({ width = 220 }) {
  const n = 9;
  return (
    <svg width={width} height="22" viewBox={`0 0 ${n*12} 22`}>
      {Array.from({length:n}).map((_,i)=>(
        <rect key={i} x={i*12+1.5} y="0" width="9" height="22" rx="2.5" fill={i%3===1?C.clay:C.sand} stroke={C.linen} strokeWidth="1"/>
      ))}
    </svg>
  );
}
// ===== E · ラウンデル（バッジ） =====
function MarkE({ d = 100 }) {
  return (
    <svg width={d} height={d} viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="29" fill={C.ivory} stroke={C.clay} strokeWidth="2"/>
      <circle cx="30" cy="30" r="24" fill={C.clay}/>
      <g transform="translate(8,8)">
        <rect x="11" y="20" width="5" height="22" rx="2" fill={C.ivory}/>
        <rect x="19" y="20" width="5" height="22" rx="2" fill={C.ivory}/>
        <rect x="27" y="20" width="5" height="22" rx="2" fill={C.ivory}/>
        <rect x="15" y="20" width="3.5" height="13" rx="1.5" fill={C.ink}/>
        <rect x="23" y="20" width="3.5" height="13" rx="1.5" fill={C.ink}/>
      </g>
      <circle cx="40" cy="22" r="6" fill={C.honey} stroke={C.clay} strokeWidth="1.5"/>
    </svg>
  );
}
// ===== F · モノライン音符 =====
function MarkF({ d = 96 }) {
  return (
    <svg width={d} height={d} viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="25" fill={C.sand}/>
      <g transform="translate(16,12)">
        <rect x="16" y="2" width="3.5" height="26" rx="1.75" fill={C.clay}/>
        <path d="M19.5 5 q11 -4 11 6" stroke={C.clay} strokeWidth="3.5" fill="none" strokeLinecap="round"/>
        <circle cx="8" cy="28" r="8" fill="none" stroke={C.clay} strokeWidth="3.5"/>
      </g>
    </svg>
  );
}

function Board({ children, mark, caption, lockColor }) {
  return (
    <div className="ab-inner" style={{ background: C.cream }}>
      <div className="stage">{mark}</div>
      <div className="divider"></div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "center", paddingTop: 14 }}>
        <div className="lockup">{children}</div>
        <div className="mark-cap" style={{ textAlign: "center" }}>{caption}</div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="logos" title="おとなりピアノ — ロゴ案" subtitle="ブランド名は確定。マークの方向性を6案で比較">
        <DCArtboard id="A" label="A · キーズタイル（現行を洗練）" width={440} height={320}>
          <Board mark={<MarkA/>} caption="鍵盤＋音符。親しみやすく実直。アプリ／ファビコン向き">
            <MarkA d={40}/><Word size={28}/>
          </Board>
        </DCArtboard>
        <DCArtboard id="B" label="B · おとなりハウス" width={440} height={320}>
          <Board mark={<MarkB/>} caption="「家＝ご近所」に音符。地域密着の温かさを最も語る案">
            <MarkB d={42}/><Word size={28}/>
          </Board>
        </DCArtboard>
        <DCArtboard id="C" label="C · ノートドット（タイポ主役）" width={440} height={320}>
          <Board mark={<MarkC/>} caption="文字を主役に、音符を一点アクセント。モダンで軽やか">
            <Word size={30}/>
          </Board>
        </DCArtboard>
        <DCArtboard id="D" label="D · 鍵盤アンダーライン" width={440} height={320}>
          <Board mark={<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14}}><Word size={34}/><KeysBar width={230}/></div>} caption="ワードマークの足元に鍵盤。署名のように上品">
            <Word size={26}/>
          </Board>
        </DCArtboard>
        <DCArtboard id="E" label="E · ラウンデル（バッジ）" width={440} height={320}>
          <Board mark={<MarkE/>} caption="円形スタンプ。看板・スタンプカード等に映える老舗感">
            <MarkE d={42}/><Word size={28}/>
          </Board>
        </DCArtboard>
        <DCArtboard id="F" label="F · モノライン音符" width={440} height={320}>
          <Board mark={<MarkF/>} caption="単線の音符をミニマルに。最も現代的で軽い印象">
            <MarkF d={40}/><Word size={28}/>
          </Board>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
