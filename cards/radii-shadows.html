<!-- @dsCard group="Spacing" viewport="700x170" name="Radii & shadows" subtitle="角丸とシャドウのシステム" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--cream); font-family: var(--font-sans); display: flex; gap: 28px; align-items: center; }
  .group { display: flex; gap: 16px; align-items: flex-end; }
  .sep { width: 1px; align-self: stretch; background: var(--hairline-strong); margin: 8px 4px; }
  .tile { width: 76px; height: 76px; background: var(--ivory); border: 1px solid var(--hairline); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; color: var(--ink-500); }
  .sh { width: 76px; height: 76px; background: var(--ivory); border-radius: var(--radius-lg); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; color: var(--ink-500); }
</style>
</head>
<body>
  <div class="group">
    <div class="tile" style="border-radius:var(--radius-sm)">sm 6</div>
    <div class="tile" style="border-radius:var(--radius-md)">md 10</div>
    <div class="tile" style="border-radius:var(--radius-lg)">lg 16</div>
    <div class="tile" style="border-radius:var(--radius-xl)">xl 24</div>
    <div class="tile" style="border-radius:var(--radius-pill)">pill</div>
  </div>
  <div class="sep"></div>
  <div class="group">
    <div class="sh" style="box-shadow:var(--shadow-xs)">xs</div>
    <div class="sh" style="box-shadow:var(--shadow-sm)">sm</div>
    <div class="sh" style="box-shadow:var(--shadow-md)">md</div>
    <div class="sh" style="box-shadow:var(--shadow-lg)">lg</div>
  </div>
</body>
</html>
