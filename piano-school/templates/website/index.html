<!-- @template name="おとなりピアノ Directory Site" description="Full click-through piano-classroom directory: home, search results, studio detail, reviews & signup." -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>おとなりピアノ — Directory Site Template</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<style>
  html, body { margin: 0; background: var(--cream, #FAF4EA); }
  #root { min-height: 100vh; display: flex; flex-direction: column; }
</style>
</head>
<body>
<div id="root"></div>
<!-- Screen components live in the UI kit; reuse them so there is one copy. -->
<script src="../../ui_kits/website/data.js"></script>
<script type="text/babel" src="../../ui_kits/website/SiteHeader.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/SiteFooter.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/HomeScreen.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/ListingScreen.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/MapScreen.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/DetailScreen.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/FaqScreen.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/PricingScreen.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/SignupScreen.jsx"></script>
<script type="text/babel">
  // Header/footer in the UI kit reference ../../assets/... — rewrite for this depth at runtime.
  window.addEventListener('load', () => {
    function App() {
      const [screen, setScreen] = React.useState("home");
      const [searchArea, setSearchArea] = React.useState("");
      const [studioId, setStudioId] = React.useState(null);
      const go = (s) => { window.scrollTo(0, 0); setScreen(s); };
      const nav = (key) => { if (key === "list") { setSearchArea(""); go("list"); } else go(key); };
      const search = (area) => { setSearchArea(area); go("list"); };
      const openStudio = (id) => { setStudioId(id); go("detail"); };
      return (
        <React.Fragment>
          <SiteHeader onNav={nav} current={screen === "detail" || screen === "map" ? "list" : screen} />
          <main style={{ flex: 1 }}>
            {screen === "home" && <HomeScreen onSearch={search} onOpenStudio={openStudio} />}
            {screen === "list" && <ListingScreen initialArea={searchArea} onOpenStudio={openStudio} onMapView={() => go("map")} />}
            {screen === "map" && <MapScreen initialArea={searchArea} onOpenStudio={openStudio} onListView={() => go("list")} />}
            {screen === "detail" && <DetailScreen studioId={studioId} onBack={() => go("list")} onSignup={() => go("signup")} />}
            {screen === "faq" && <FaqScreen onSignup={() => go("signup")} onSearch={search} />}
            {screen === "pricing" && <PricingScreen onSignup={() => go("signup")} />}
            {screen === "signup" && <SignupScreen onDone={() => go("home")} />}
          </main>
          <SiteFooter onNav={nav} />
        </React.Fragment>
      );
    }
    const start = () => {
      if (!window.PianoSchool_f8945d || !window.HomeScreen) { setTimeout(start, 60); return; }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    };
    start();
  });
</script>
</body>
</html>
