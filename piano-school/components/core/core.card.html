<!-- @dsCard group="Components" viewport="700x340" name="Core — Buttons, Tags, Badges, Rating" subtitle="主要アクションとラベル類" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--cream); }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .cap { font-family: var(--font-sans); font-size: 11px; font-weight: 700; letter-spacing: .04em; color: var(--ink-500); margin-bottom: 8px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Badge, Tag, RatingStars } = window.PianoSchool_f8945d;
  function Demo() {
    const [sel, setSel] = React.useState(true);
    return (
      <div className="stack">
        <div>
          <div className="cap">BUTTONS</div>
          <div className="row">
            <Button variant="primary">教室をさがす</Button>
            <Button variant="secondary">あとで見る</Button>
            <Button variant="ghost">キャンセル</Button>
            <Button variant="accent">体験を申し込む</Button>
            <Button variant="primary" disabled>送信中…</Button>
          </div>
        </div>
        <div className="row">
          <div>
            <div className="cap">SIZES</div>
            <div className="row">
              <Button size="sm">小</Button>
              <Button size="md">中</Button>
              <Button size="lg">大</Button>
            </div>
          </div>
          <div style={{marginLeft:24}}>
            <div className="cap">ICON</div>
            <div className="row">
              <IconButton label="お気に入り" variant="outline"><span style={{fontSize:18}}>♡</span></IconButton>
              <IconButton label="共有" variant="ghost"><span style={{fontSize:16}}>↗</span></IconButton>
              <IconButton label="決定" variant="solid"><span style={{fontSize:16}}>✓</span></IconButton>
            </div>
          </div>
        </div>
        <div className="row">
          <div>
            <div className="cap">BADGES</div>
            <div className="row">
              <Badge tone="success">体験あり</Badge>
              <Badge tone="primary">クラシック</Badge>
              <Badge tone="accent">人気</Badge>
              <Badge tone="info">オンライン可</Badge>
              <Badge tone="primary" solid>NEW</Badge>
            </div>
          </div>
          <div style={{marginLeft:24}}>
            <div className="cap">RATING</div>
            <RatingStars value={4.6} count={28} />
          </div>
        </div>
        <div>
          <div className="cap">TAGS（フィルター）</div>
          <div className="row">
            <Tag selected={sel} onClick={() => setSel(!sel)}>子ども歓迎</Tag>
            <Tag>大人向け</Tag>
            <Tag removable onRemove={()=>{}}>渋谷区</Tag>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
