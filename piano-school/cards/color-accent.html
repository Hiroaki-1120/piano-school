<!-- @dsCard group="Colors" viewport="700x150" name="Accent & Semantic" subtitle="ハニー・セージ＋状態カラー" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--ivory); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { height: 86px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; box-shadow: var(--shadow-xs); }
  .sw b { font-size: 12px; font-weight: 700; color: var(--ivory); }
  .sw span { font-size: 10px; color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw" style="background:var(--honey-500)"><b>honey · accent</b><span>#DE9F3A</span></div>
    <div class="sw" style="background:var(--sage-500)"><b>sage · 2nd</b><span>#6E8B5E</span></div>
    <div class="sw" style="background:var(--green-500)"><b>success</b><span>#5C8A52</span></div>
    <div class="sw" style="background:var(--amber-500)"><b>warning</b><span>#D8902F</span></div>
    <div class="sw" style="background:var(--red-500)"><b>danger</b><span>#C2503E</span></div>
    <div class="sw" style="background:var(--blue-500)"><b>info</b><span>#4A7A9B</span></div>
    <div class="sw" style="background:var(--honey-400)"><b>star</b><span>#E8B257</span></div>
    <div class="sw" style="background:var(--sage-700)"><b>sage-700</b><span>#51694A</span></div>
  </div>
</body>
</html>
