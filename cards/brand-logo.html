<!-- @dsCard group="Brand" viewport="700x280" name="Logo system" subtitle="ラウンデル・エンブレム／横・縦ロックアップ／モノクロ" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--cream); }
  .grid { display: grid; grid-template-columns: 1.1fr 1fr; grid-template-rows: 1fr 1fr; height: 280px; }
  .cell { display: flex; align-items: center; justify-content: center; gap: 14px; border-right: 1px solid var(--hairline); border-bottom: 1px solid var(--hairline); position: relative; padding: 16px; }
  .cell:nth-child(2n) { border-right: none; }
  .cell:nth-child(n+3) { border-bottom: none; }
  .dark { background: var(--ink-900); }
  .word { font-family: var(--font-display); font-weight: 700; color: var(--ink-900); letter-spacing: .02em; }
  .word-dark { color: var(--cream); }
  .tag { position: absolute; top: 10px; left: 12px; font-size: 10px; letter-spacing: .04em; color: var(--ink-300); }
  .tag-d { color: rgba(255,255,255,.4); }
  .stack { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sizes { display: flex; align-items: flex-end; gap: 14px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell">
      <span class="tag">横ロックアップ（基本形）</span>
      <img src="../assets/logo-mark.svg" style="height:46px">
      <span class="word" style="font-size:27px">おとなりピアノ</span>
    </div>
    <div class="cell dark">
      <span class="tag tag-d">反転（ダーク背景）</span>
      <img src="../assets/logo-mark.svg" style="height:42px">
      <span class="word word-dark" style="font-size:24px">おとなりピアノ</span>
    </div>
    <div class="cell">
      <span class="tag">縦ロックアップ</span>
      <div class="stack">
        <img src="../assets/logo-mark.svg" style="height:52px">
        <span class="word" style="font-size:20px">おとなりピアノ</span>
      </div>
    </div>
    <div class="cell">
      <span class="tag">エンブレム単体・モノクロ・サイズ</span>
      <div class="sizes">
        <img src="../assets/logo-mark.svg" style="height:52px">
        <img src="../assets/logo-mark.svg" style="height:32px">
        <div style="color:var(--ink-900);display:flex"><img src="../assets/logo-mark-mono.svg" style="height:40px"></div>
        <div style="color:var(--clay-500);display:flex"><img src="../assets/logo-mark-mono.svg" style="height:40px"></div>
      </div>
    </div>
  </div>
</body>
</html>
