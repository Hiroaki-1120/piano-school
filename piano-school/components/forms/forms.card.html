<!-- @dsCard group="Components" viewport="700x360" name="Forms — Input, Select, Textarea, Checkbox" subtitle="検索・掲載申込フォームの部品" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--cream); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 20px; align-items: start; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select, Textarea, Checkbox } = window.PianoSchool_f8945d;
  function Demo() {
    const [c1, setC1] = React.useState(true);
    const [c2, setC2] = React.useState(false);
    return (
      <div className="grid">
        <Input label="エリア・駅名" placeholder="例：三軒茶屋" iconLeft={<span>📍</span>} />
        <Select label="並び替え" options={["おすすめ順","口コミの多い順","月謝が安い順"]} />
        <Input label="メールアドレス" defaultValue="example@" error="正しい形式で入力してください" />
        <div style={{display:"flex",flexDirection:"column",gap:10,paddingTop:24}}>
          <Checkbox label="体験レッスンあり" checked={c1} onChange={e=>setC1(e.target.checked)} />
          <Checkbox label="オンライン対応" checked={c2} onChange={e=>setC2(e.target.checked)} />
          <Checkbox label="駐車場あり（準備中）" disabled />
        </div>
        <div style={{gridColumn:"1 / -1"}}>
          <Textarea label="口コミを書く" rows={3} hint="先生やレッスンの雰囲気を教えてください" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
